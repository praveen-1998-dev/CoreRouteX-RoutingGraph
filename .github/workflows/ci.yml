name: CoreRouteX CI/CD

# Trigger workflow on push to main branch or pull request
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-push-docker:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout the repository
      - name: Checkout repository
        uses: actions/checkout@v3

      # Step 2: Set up Java 17
      - name: Set up Java
        uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: '17'

      # Step 3: Build the Spring Boot JAR
      - name: Build JAR
        run: mvn clean package -DskipTests

      # Step 4: Set up Docker Buildx (for building images)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      # Step 5: Log in to Docker Hub using secrets
      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_PASSWORD }}

      # Step 6: Build Docker image
      - name: Build Docker image
        run: |
          docker build -t praveenn1997/core-routex:latest .

      # Step 7: Push Docker image to Docker Hub
      - name: Push Docker image
        run: |
          docker push praveenn1997/core-routex:latest